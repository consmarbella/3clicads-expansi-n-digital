<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comprar Bitcoin - 3clicAds</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A0A0A;font-family:'Syne',sans-serif;color:#F0EDE6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 70% 20%,rgba(201,168,76,0.04) 0%,transparent 70%),radial-gradient(ellipse 400px 600px at 10% 80%,rgba(201,168,76,0.03) 0%,transparent 60%);pointer-events:none;z-index:0}
  .card{position:relative;z-index:1;background:#111;border:1px solid rgba(201,168,76,0.18);border-radius:20px;width:100%;max-width:420px;padding:2.5rem;box-shadow:0 0 80px rgba(201,168,76,0.06)}
  .card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,#C9A84C,transparent)}
  .header{display:flex;align-items:center;gap:14px;margin-bottom:2rem}
  .btc-icon{width:44px;height:44px;background:linear-gradient(135deg,#7A6030,#C9A84C);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#0A0A0A;flex-shrink:0}
  .header-text h1{font-size:1.15rem;font-weight:700;color:#F0EDE6;line-height:1.2}
  .header-text p{font-size:0.78rem;color:#888880;font-family:'DM Mono',monospace;margin-top:2px}
  .powered{margin-left:auto;font-size:0.65rem;color:#7A6030;font-family:'DM Mono',monospace;text-align:right;line-height:1.4}
  .label{font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#7A6030;margin-bottom:8px}
  .input-row{display:flex;align-items:center;background:#181818;border:1px solid rgba(201,168,76,0.18);border-radius:10px;overflow:hidden;transition:border-color 0.2s}
  .input-row:focus-within{border-color:rgba(201,168,76,0.45)}
  .currency-badge{padding:0 16px;font-size:0.8rem;font-weight:600;font-family:'DM Mono',monospace;color:#C9A84C;background:rgba(201,168,76,0.07);border-right:1px solid rgba(201,168,76,0.18);height:50px;display:flex;align-items:center;flex-shrink:0}
  input[type="number"]{flex:1;background:transparent;border:none;outline:none;color:#F0EDE6;font-family:'DM Mono',monospace;font-size:1rem;padding:0 16px;height:50px;width:0}
  input::placeholder{color:#888880;font-size:0.85rem}
  input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
  .estimate-box{background:rgba(201,168,76,0.04);border:1px solid rgba(201,168,76,0.18);border-radius:10px;padding:14px 18px;min-height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .estimate-label{font-size:0.75rem;color:#888880;font-family:'DM Mono',monospace}
  .estimate-value{font-size:1.05rem;font-family:'DM Mono',monospace;font-weight:400;color:#E8C97A;text-align:right}
  .estimate-value.loading{color:#888880;font-size:0.85rem;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .btn{width:100%;padding:15px;background:linear-gradient(135deg,#7A6030,#C9A84C);border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#0A0A0A;cursor:pointer;transition:opacity 0.2s;display:block;text-decoration:none;text-align:center}
  .btn:hover{opacity:0.88}
  .btn:disabled{opacity:0.35;cursor:not-allowed}
  .alert{padding:12px 16px;border-radius:8px;font-size:0.82rem;font-family:'DM Mono',monospace;margin-bottom:1rem;line-height:1.5;display:none;background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.3);color:#E07070}
  .alert.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="btc-icon">&#x20BF;</div>
    <div class="header-text">
      <h1>Comprar Bitcoin</h1>
      <p>USD &rarr; BTC</p>
    </div>
    <div class="powered">Powered by<br>Guardarian</div>
  </div>
  <div class="alert" id="alertBox"></div>

  <div class="label">Monto en USD</div>
  <div class="input-row">
    <div class="currency-badge">$</div>
    <input type="number" id="usdAmount" placeholder="0.00" min="20" step="0.01" oninput="onCambio()" />
  </div>
  <div class="estimate-box">
    <div class="estimate-label">Recibes</div>
    <div class="estimate-value" id="estimateVal">&mdash;</div>
  </div>
  <button class="btn" id="btnPagar" onclick="pagar()">Comprar Bitcoin</button>


</div>

<script>
var timer = null;

function alerta(msg) {
  var box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = 'alert show';
}

function onCambio() {
  clearTimeout(timer);
  var val = parseFloat(document.getElementById('usdAmount').value);
  var el = document.getElementById('estimateVal');
  if (!val || val < 20) { el.textContent = '\u2014'; el.className = 'estimate-value'; return; }
  el.textContent = 'Calculando...';
  el.className = 'estimate-value loading';
  timer = setTimeout(function() { estimar(val); }, 600);
}

async function estimar(usd) {
  var el = document.getElementById('estimateVal');
  try {
    var r = await fetch('/api/estimate?from_amount=' + usd);
    var data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error');
    el.textContent = parseFloat(data.value).toFixed(8) + ' BTC';
    el.className = 'estimate-value';
  } catch(e) {
    el.textContent = 'Error';
    el.className = 'estimate-value';
  }
}

function pagar() {
  var usd = parseFloat(document.getElementById('usdAmount').value);
  if (!usd || usd < 20) { alerta('Minimo USD 20'); return; }

  var btn = document.getElementById('btnPagar');
  btn.disabled = true;
  btn.textContent = 'Creando transacci\u00f3n...';

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/create-btc', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    if (xhr.status !== 200) {
      try {
        var err = JSON.parse(xhr.responseText || '{}');
        alerta('Error: ' + (err.error || 'Error ' + xhr.status));
      } catch(e) {
        alerta('Error: ' + xhr.status);
      }
      btn.disabled = false;
      btn.textContent = 'Comprar Bitcoin';
      return;
    }
    try {
      var data = JSON.parse(xhr.responseText);
      if (data.redirect_url) {
        window.location.href = data.redirect_url;
      } else {
        alerta('Error: Sin URL de pago');
        btn.disabled = false;
        btn.textContent = 'Comprar Bitcoin';
      }
    } catch(e) {
      alerta('Error al procesar respuesta');
      btn.disabled = false;
      btn.textContent = 'Comprar Bitcoin';
    }
  };
  xhr.onerror = function() {
    alerta('Error de conexion');
    btn.disabled = false;
    btn.textContent = 'Comprar Bitcoin';
  };
  xhr.send(JSON.stringify({ from_amount: usd }));
}


</script>
</body>
</html>
